name: "Release Creator and Changelog Updater"
description: >
  Reads the version from package.json (or an explicit override), updates CHANGELOG.md,
  and creates a GitHub release. On first run it opens a changelog PR for review,
  on subsequent runs it publishes the release. Commit log with contributor mentions
  is included automatically.

inputs:
  github-token:
    required: false
    description: "GitHub Token for authentication."
    default: ${{ github.token }}
  dry-run:
    required: false
    description: "Enable dry-run mode (does not actually create a release)"
    default: "false"
  release-draft:
    description: "Mark release as draft."
    required: false
    default: "false"
  release-prerelease:
    description: "Mark release as prerelease."
    required: false
    default: "false"
  release-title-prefix:
    description: "Prefix for release title."
    required: false
    default: ""
  tag-template:
    description: "Custom template for tag naming (e.g., 'ms/<version>'). If empty, package.json (v<version>) is used."
    required: false
    default: "v<version>"
  changelog-file-path:
    description: "Path to the changelog file."
    required: false
    default: "CHANGELOG.md"
  version:
    description: "Explicit version override (takes precedence over package.json)"
    required: false
    default: ""
  ci-workflows:
    description: >
      Comma-separated workflow file names to dispatch after creating a changelog PR.
      Use 'auto' (default) to dispatch all workflow_dispatch-enabled workflows except the release workflow itself.
      Use 'none' or 'false' to disable dispatch entirely.
      Dispatched CI job results are mirrored as GitHub Check Runs on the changelog PR head SHA,
      so required checks are satisfied automatically.
      Requires: permissions: actions: write, checks: write (plus contents: write, pull-requests: write).
    required: false
    default: "auto"

outputs:
  release-url:
    description: "URL of the created GitHub release."

runs:
  using: "docker"
  image: "Dockerfile"
